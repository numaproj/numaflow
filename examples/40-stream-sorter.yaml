apiVersion: numaflow.numaproj.io/v1alpha1
kind: Pipeline
metadata:
  name: stream-sorter-sliding
spec:
  vertices:
    - name: in
      scale:
        min: 1
      source:
        udsource:
          container:
            # Jitter source: multi-key events with event-time jitter that
            # periodically pauses some keys for PAUSE_TIMEOUT_SECS.
            image: docker.intuit.com/personal/vtiwari5/numaflow-rs/sliding-keys-source:stable
            imagePullPolicy: Always
            env:
              - name: NUM_KEYS
                value: "10"
              - name: FLUSH_INTERVAL_SECS
                value: "60"
              - name: EMIT_INTERVAL_MS
                value: "100"
              - name: MAX_TPS
                value: "0"
    - name: accum
      udf:
        container:
          env:
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: MALLOC_TRIM_THRESHOLD_
              value: "131072"
          image: docker.intuit.com/personal/vtiwari5/numaflow-rs/stream-sorter:stable
        groupBy:
          window:
            accumulator:
              timeout: 5s
          keyed: true
          storage:
            persistentVolumeClaim:
              volumeSize: 1Gi
    - name: sink
      scale:
        min: 1
      sink:
        log: {}
  edges:
    - from: in
      to: accum
    - from: accum
      to: sink
